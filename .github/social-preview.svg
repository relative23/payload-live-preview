    <g transform="translate(204,556)">
      <rect width="110" height="34" rx="17" fill="#ffffff" opacity="0.07"/>
      <text x="55" y="22" text-anchor="middle" fill="#8fa0c8">Next.js</text>
    </g>
    <g transform="translate(326,556)">
      <rect width="120" height="34" rx="17" fill="#ffffff" opacity="0.07"/>
      <text x="60" y="22" text-anchor="middle" fill="#8fa0c8">SvelteKit</text>
    </g>
    <g transform="translate(458,556)">
      <rect width="90" height="34" rx="17" fill="#ffffff" opacity="0.07"/>
