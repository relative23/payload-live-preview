  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.035">
    <path d="M0 160 H1280 M0 320 H1280 M0 480 H1280"/>
    <path d="M320 0 V640 M640 0 V640 M960 0 V640"/>
  </g>

  <!-- editor pane -->
  <g transform="translate(72,150)">
    <rect x="0" y="0" width="380" height="340" rx="14" fill="#1a2138" stroke="#2c3654" stroke-width="2"/>
    <rect x="0" y="0" width="380" height="44" rx="14" fill="#232c4a"/>
    <rect x="0" y="30" width="380" height="14" fill="#232c4a"/>
    <circle cx="24" cy="22" r="6" fill="#ff6b6b"/>
    <circle cx="46" cy="22" r="6" fill="#ffc94d"/>
    <circle cx="68" cy="22" r="6" fill="#57d98e"/>
    <text x="96" y="28" font-family="DejaVu Sans, sans-serif" font-size="16" fill="#8fa0c8">Payload Admin</text>

    <text x="28" y="86" font-family="DejaVu Sans, sans-serif" font-size="14" fill="#68779e">Title</text>
    <rect x="28" y="98" width="324" height="40" rx="8" fill="#0e1428" stroke="#31406b" stroke-width="1.5"/>
    <text x="42" y="124" font-family="DejaVu Sans Mono, monospace" font-size="17" fill="#dce6ff">Sommerangebot 2026</text>
    <rect x="243" y="106" width="2" height="24" fill="#5ba7ff">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>

    <text x="28" y="176" font-family="DejaVu Sans, sans-serif" font-size="14" fill="#68779e">Rich Text</text>
    <rect x="28" y="188" width="324" height="120" rx="8" fill="#0e1428" stroke="#31406b" stroke-width="1.5"/>
    <rect x="42" y="204" width="220" height="12" rx="6" fill="#3d4a75"/>
    <rect x="42" y="228" width="290" height="12" rx="6" fill="#2c3654"/>
    <rect x="42" y="252" width="260" height="12" rx="6" fill="#2c3654"/>
    <rect x="42" y="276" width="180" height="12" rx="6" fill="#2c3654"/>
  </g>

  <!-- arrow -->
  <g transform="translate(470,300)">
    <path d="M4 20 H86" stroke="url(#accent)" stroke-width="7" stroke-linecap="round"/>
    <path d="M82 4 L112 20 L82 36 Z" fill="#8b7bff"/>
    <text x="58" y="-10" text-anchor="middle" font-family="DejaVu Sans Mono, monospace" font-size="14" fill="#8fa0c8">postMessage</text>
  </g>

  <!-- preview pane -->
  <g transform="translate(600,120)">
    <rect x="0" y="0" width="420" height="400" rx="14" fill="#1a2138" stroke="#2c3654" stroke-width="2"/>
    <rect x="0" y="0" width="420" height="44" rx="14" fill="#232c4a"/>
    <rect x="0" y="30" width="420" height="14" fill="#232c4a"/>
    <rect x="90" y="12" width="240" height="20" rx="10" fill="#0e1428"/>
    <text x="210" y="27" text-anchor="middle" font-family="DejaVu Sans Mono, monospace" font-size="13" fill="#68779e">deine-site.at/angebote</text>

    <text x="32" y="106" font-family="DejaVu Sans, sans-serif" font-weight="bold" font-size="30" fill="#f2f6ff">Sommerangebot 2026</text>
    <rect x="32" y="122" width="252" height="4" rx="2" fill="url(#accent)" opacity="0.85"/>

    <rect x="32" y="152" width="356" height="110" rx="10" fill="#26304e"/>
    <circle cx="70" cy="190" r="20" fill="#31406b"/>
    <path d="M40 244 L96 200 L150 236 L206 190 L280 246 L388 246 L388 252 C388 258 382 262 376 262 L44 262 C38 262 32 258 32 252 Z" fill="#31406b"/>

    <rect x="32" y="286" width="340" height="12" rx="6" fill="#3d4a75"/>
    <rect x="32" y="310" width="300" height="12" rx="6" fill="#2c3654"/>
    <rect x="32" y="334" width="320" height="12" rx="6" fill="#2c3654"/>

    <g transform="translate(32,366)">
      <rect width="120" height="30" rx="15" fill="#5ba7ff" opacity="0.16" stroke="#5ba7ff" stroke-opacity="0.5"/>
      <text x="60" y="20" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="14" fill="#9cc4ff">live · &lt;50 ms</text>
    </g>
  </g>

  <!-- title block -->
  <text x="72" y="80" font-family="DejaVu Sans, sans-serif" font-weight="bold" font-size="44" fill="#f2f6ff">payload-live-preview</text>
  <text x="72" y="116" font-family="DejaVu Sans, sans-serif" font-size="22" fill="#8fa0c8">Framework-agnostic live preview for Payload CMS</text>

