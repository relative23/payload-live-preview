name: Feature request
description: Suggest an improvement or new capability
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What are you trying to do, and what makes it hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to happen? Include a sketch of the API if relevant.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you have tried or other designs you considered.
  - type: dropdown
    id: willing-to-pr
    attributes:
      label: Are you willing to open a PR for this?
      options:
        - "Yes"
        - "Yes, with guidance"
        - "No"
    validations:
      required: true
