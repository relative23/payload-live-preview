name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      # npm >= 11.5 is required for OIDC trusted publishing (tokenless).
      - run: npm install -g npm@latest

      - run: npm ci
      - run: npm run check
      - run: npm run build

      # Publishes via npm Trusted Publishing (OIDC) — no NPM_TOKEN. The
      # `id-token: write` permission above lets npm verify this repo +
      # workflow against the trusted publisher configured on the package,
      # and provenance is attached automatically.
      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          publish: npm run release
          version: npm run version
          commit: 'chore: release'
          title: 'chore: release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
