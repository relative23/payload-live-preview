name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check

  unit:
    name: Unit Tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22, 24, 26]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run build:runtime
      - run: npm run test:unit
      - run: npm run test:integration

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build:runtime
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  e2e:
    name: E2E (${{ matrix.browser }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps ${{ matrix.browser }}
      - run: npm run build
      # The example apps double as E2E fixtures; they consume the
      # freshly built package via their file:../.. dependency. `npm
      # install` instead of `npm ci`: the lock file pins the file: dep
      # at the version current at lock time, which `npm ci` rejects
      # after any version bump.
      - run: npm install --no-audit --no-fund --prefix examples/astro-payload
      - run: npm install --no-audit --no-fund --prefix examples/nextjs-payload
      - run: npm install --no-audit --no-fund --prefix examples/sveltekit-payload
      - run: npx playwright test --project=${{ matrix.browser }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 7

  real-payload-e2e:
    name: Real Payload E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      # The Astro preview fixture consumes the freshly built package
      # (file:../.. dep); the Payload backend is a standalone server that
      # generates its admin import map on boot via `e2e:serve`.
      - run: npm install --no-audit --no-fund --prefix examples/astro-payload
      - run: npm install --no-audit --no-fund --prefix examples/payload-backend
      # Boots a real Payload 3.x admin + the Astro preview and drives the
      # real postMessage protocol end to end (playwright.real-payload.config.ts).
      - run: npm run test:e2e:real-payload
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-real-payload
          path: playwright-report/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
