name: Protocol Watch

# This library hand-mirrors Payload's live-preview postMessage protocol
# (no `payload` dependency by design). This weekly job downloads the
# latest @payloadcms/live-preview and asserts the wire-format
# invariants we depend on, so protocol drift surfaces as a red run
# instead of silent breakage in consumer projects.

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  protocol-watch:
    name: Wire-format invariants (${{ matrix.dist-tag }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # latest is the gate: drift here = broken for real users NOW.
          - dist-tag: latest
            soft-fail: false
          # canary (e.g. Payload 4.0 pre-releases) is an early-warning
          # signal, not a gate — pre-release protocols may legitimately
          # churn before stabilising.
          - dist-tag: canary
            soft-fail: true
    continue-on-error: ${{ matrix.soft-fail }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsx scripts/check-protocol-drift.ts
        env:
          PROTOCOL_WATCH_PACKAGE: '@payloadcms/live-preview@${{ matrix.dist-tag }}'
